<article class="card secondary">
  <a href="/">
    <figure class="aspect-ratio aspect-1-1 fit">
      <img src="/" alt="{{product.name}}" />
    </figure>
  </a>
  <div class="description">
    <h3 class="title text-lg">{{product.name}}</h3>
    <p class="price text-lg">R$ {{product.get_price}}</p>
    <button class="gn-button tt-button small full" type="button">
      Adicionar ao carrinho
    </button>
  </div>
</article>
