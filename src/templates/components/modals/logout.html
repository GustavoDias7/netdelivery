<div class="modal primary logout" :class="{active: modal.logout}">
  <div class="modal-content">
    <button class="modal-close" @click="closeLogout"></button>
    <div>
      <h2 class="text-color-primary">Sair</h2>
      <p class="text-base text-mb-4">Você deseja sair da sua conta?</p>
      <a href="{% url 'logout' username %}" class="gn-button pm-button full small">Confirmar</a>
    </div>
  </div>
</div>
