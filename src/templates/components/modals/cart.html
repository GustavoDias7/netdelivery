<div class="modal secondary cart-modal" :class="{active: modal.cart}">
  <div class="modal-content">
    <div class="modal-header">
      <h2 class="modal-title text-2xl sm:text-3xl">Carrinho</h2>
      <button
        class="modal-close"
        @click.prevent="closeCart"
        type="button"
      ></button>
    </div>
    <div class="modal-body">
      <p class="text-sm sm:text-base" v-if="cart.cart.length === 0">
        Não há itens no seu carrinho!
      </p>
      <div v-else class="g-root g-gap-4 sm:g-gap-5 g-hidden">
        <div class="g-row">
          <div v-for="item in cart.cart" class="g-item-12">
            <div class="cart-item">
              <a href="/" class="img">
                <figure class="aspect-ratio aspect-1-1 fit">
                  <img
                    src="static/media/placeholder-1.svg"
                    alt="Placeholder"
                  />
                </figure>
              </a>
              <div class="cart-item-center">
                <h3 class="text-sm" v-text="item.name"></h3>
                <div class="counter small">
                  <button
                    class="counter-button"
                    @click="cart.removeItem(item.id)"
                    :disabled="cart.getCount(item.id) === 1"
                  >
                    <span class="sign minus"></span>
                  </button>
                  <p
                    class="counter-input"
                    v-text="cart.getCount(item.id)"
                  ></p>
                  <button
                    class="counter-button"
                    @click="cart.addItem(item.id, item.name, item.price)"
                  >
                    <span class="sign"></span>
                  </button>
                </div>
                <p class="text-base">R$ <span v-text="item.fprice"></span></p>
              </div>
              <button
                class="delete"
                type="button"
                @click="cart.deleteItem(item.id)"
              ></button>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <div class="g-root g-gap-4 sm:g-gap-5">
        <div class="g-row">
          <div class="g-item-12"><hr /></div>
          <div class="g-item-12">
            <div class="cart-total">
              <div class="g-root g-gap-2">
                <div class="g-row">
                  <div class="g-item-12">
                    <div class="cart-total-item">
                      <p>Total</p>
                      <p>R$ <strong v-text="cart.ftotalPrice()"></strong></p>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div class="g-item-12">
            <a
              class="gn-button tt-button full small sm:regular"
              href="{% url 'delivery' %}"
            >
              Comprar
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
