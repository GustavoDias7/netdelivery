{% load static %}

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="{% static 'img/favicon.ico' %}">
    <title>
        NetDelivery | {% block title %}Default title{% endblock %}
    </title>
    {% block css %}
        <link href="{% static 'css/pages/error.css' %}?{% now 'U' %}" type="text/css" rel="stylesheet">
    {% endblock %}
</head>
<body>
    <div class="app error-page" id="app">
        {% include "../layouts/header/primary.html" %}
        
        {% block content %}{% endblock %}

        {% include "../layouts/footer/secondary.html" %}
    </div>
    {% block js %}{% endblock %}
</body>
</html>
