<section class="address" v-if="is_delivery">
  <div class="container sm:container">
    <div class="title-container">
      <h2 class="text-2xl sm:text-3xl">Endereço</h2>
      <a class="text-sm" href="{% url 'address' %}">Editar</a>
    </div>

    <div>
      <p class="text-sm sm:text-lg"><strong>CEP:</strong> {{address.logradouro.fcep}}</p>
      <p class="text-sm sm:text-lg"><strong>Bairro:</strong> {{address.logradouro.bairro.name}}</p>
      <p class="text-sm sm:text-lg"><strong>Endereço:</strong> {{address.logradouro.type}} {{address.logradouro.name}}</p>
      <p class="text-sm sm:text-lg">
        <strong>Número:</strong> {% firstof address.number "*Sem número (s/n)*" %}
      </p>
      <p class="text-sm sm:text-lg">
        <strong>Complemento:</strong> {% firstof address.complement "*Sem complemento*" %}
      </p>
    </div>
  </div>
</section>
