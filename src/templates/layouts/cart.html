<section class="cart">
  <div class="container sm:container">
    <h2 class="text-2xl sm:text-3xl">Carrinho</h2>

    <div class="g-root g-gap-4 sm:g-gap-5">
      <div class="g-row">
        <div v-for="item in cart.cart" class="g-item-12">
          <div class="cart-item">
            <a href="/" class="img">
              <figure class="aspect-ratio aspect-1-1 fit">
                <img {% comment %} src="" {% endcomment %} alt="Placeholder" />
              </figure>
            </a>
            <div class="cart-item-center">
              <div class="cart-item-center-left">
                <h3 class="text-sm sm:text-base" v-text="item.name"></h3>
                <div class="counter small">
                  <button
                    class="counter-button"
                    type="button"
                    @click="cart.removeItem(item.id)"
                    :disabled="cart.getCount(item.id) === 1"
                  >
                    <span class="sign minus"></span>
                  </button>
                  <p
                    class="counter-input"
                    v-text="cart.getCount(item.id)"
                  ></p>
                  <button
                    class="counter-button"
                    type="button"
                    @click="cart.addItem(item.id, item.name, item.price)"
                  >
                    <span class="sign"></span>
                  </button>
                </div>
              </div>
              <div class="cart-item-center-right">
                <p class="text-base">R$ <span v-text="item.fprice"></span></p>
              </div>
            </div>
            <button
              class="delete"
              type="button"
              @click="cart.deleteItem(item.id)"
            ></button>
          </div>
        </div>
        <div class="g-item-12"><hr /></div>
        <div class="g-item-12">
          <div class="cart-total">
            <div class="g-root g-gap-1">
              <div class="g-row">
                <div class="g-item-12">
                  <div class="cart-total-item">
                    <p>Price</p>
                    <p class="price tertiary">
                      <span class="left"> <span>R$</span> </span>
                      <strong>0,00</strong>
                    </p>
                  </div>
                </div>
                <div class="g-item-12">
                  <div class="cart-total-item">
                    <p>Tax</p>
                    <p class="price tertiary">
                      <span class="left"> <span>R$</span> </span>
                      <strong>0,00</strong>
                    </p>
                  </div>
                </div>
                <div class="g-item-12">
                  <div class="cart-total-item">
                    <p>Total</p>
                    <p class="price tertiary">
                      <span class="left"> <span>R$</span> </span>
                      <strong v-text="cart.ftotalPrice()"></strong>
                    </p>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
