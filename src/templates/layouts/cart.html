<section class="cart">
  <div class="container sm:container">
    <h2 class="text-2xl sm:text-3xl">Carrinho</h2>

    <div class="g-root g-gap-4 sm:g-gap-6">
      <div class="g-row">
        <div class="g-item-12" v-for="x in [1]">
          <div class="cart-item">
            <div class="img">
              <figure class="aspect-ratio aspect-1-1 fit">
                <img
                  {% comment %} src="static/media/placeholder-1.f88ca17b.svg" {% endcomment %}
                  alt="Placeholder"
                />
              </figure>
            </div>
            <div class="cart-item-center">
              <h3 class="text-base">CartItem title</h3>
              <div class="counter small">
                <button class="counter-button" type="button">
                  <span class="sign minus"></span>
                </button>
                <input class="counter-input" type="text" value="999" />
                <button class="counter-button" type="button">
                  <span class="sign"></span>
                </button>
              </div>
              <p class="text-base.6">R$ 99,99</p>
            </div>
            <button class="delete" type="button"></button>
          </div>
        </div>

        <div class="g-item-12"><hr /></div>

        <div class="g-item-12">
          <div class="cart-total">
            <div class="g-root g-gap-1">
              <div class="g-row">
                <div class="g-item-12">
                  <div class="cart-total-item">
                    <p>Price</p>
                    <p class="text-xl">R$ 99,99</p>
                  </div>
                </div>
                <div class="g-item-12">
                  <div class="cart-total-item">
                    <p>Tax</p>
                    <p class="text-xl">R$ 99,99</p>
                  </div>
                </div>
                <div class="g-item-12">
                  <div class="cart-total-item">
                    <p>Total</p>
                    <p class="text-xl">R$ 99,99</p>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
