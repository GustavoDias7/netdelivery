<section class="order-type section">
  <div class="container sm:container">
    <h2 class="text-2xl sm:text-3xl text-mb-5 text-color-primary">Pedido</h2>

    <div class="g-root g-gap-4 sm:g-gap-6">
      <div class="g-row">
        <div class="g-item-12">
          <div class="g-root g-gap-2 sm:g-gap-4">
            <div class="g-row">
              <div class="g-item-12 sm:g-item-6">
                <label
                  class="gn-button full"
                  :class="is_delivery ? 'pm-button' : 'sc-button'"
                  for="delivery"
                >
                  <input
                    type="radio"
                    v-model="is_delivery"
                    name="is_delivery"
                    id="delivery"
                    :value="true"
                  />
                  Delivery
                </label>
              </div>
              <div class="g-item-12 sm:g-item-6">
                <label
                  class="gn-button full"
                  :class="!is_delivery ? 'pm-button' : 'sc-button'"
                  for="retirada"
                >
                  <input
                    type="radio"
                    v-model="is_delivery"
                    name="is_delivery"
                    id="retirada"
                    :value="false"
                  />
                  Retirada
                </label>
              </div>
            </div>
          </div>
        </div>
        <div class="g-item-12">
          <div class="order-description">
            <p v-if="is_delivery" class="text-base sm:text-xl">
              Você receberá o seu produto no conforto da sua casa pela taxa de
              {{shippingfee.fvalue}}.
            </p>
            <p v-if="!is_delivery" class="text-base sm:text-xl">
              Você pode retirar seu pedido no endereço do nosso estabelecimento.
              Rua alguma coisa, bairro Pirirí Pororó, cidade de Algum Lugar,
              estado AL, próximo ao buteco do Seu Quincas. CEP
              <a href="">12345-678</a>.
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
