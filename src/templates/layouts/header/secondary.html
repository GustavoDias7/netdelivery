{% load static %}
<header class="header secondary">
  <div class="container md:container">
    <div class="left"><a class="logo" href="{% url 'homepage' username=username %}">Logo</a></div>
    <div class="right">
      <nav>
        <a class="link" href="{% url 'homepage' username=username %}#about">Sobre Nós</a> 

        {% if header_categories|length or header_combos %}
        <div class="dropdown-desktop">
          <button class="link">Produtos</button>
          <div class="dropdown-content">
            {% for category in header_categories %}
            <p class="text-mb-2">
              <a class="link" href="{% url 'homepage' username=username %}#{{category.get_code}}">
                {{category.name}}
              </a>
            </p>
            {% endfor %}
            {% if header_combos %}
            <p class="text-mb-2">
              <a class="link" href="{% url 'homepage' username=username %}#combos">Combos</a>
            </p>
            {% endif %}
          </div>
        </div>
        {% endif %}

        <a class="link" href="{% url 'homepage' username=username %}#faq">Perguntas</a>
        <a class="link" href="{% url 'homepage' username=username %}#contacts">Contatos</a>
        <a class="" href="/" @click.prevent="openCart">
          <span class="badge active">
            <p class="badge-item" v-text="cart.totalCount(99)"></p>
            <img src="{% static 'img/shopping-cart.svg' %}" alt="Carrinho" />
          </span>
        </a>
        <button class="menu-button" @click="openModal('menu')">
          Open menu
        </button>
      </nav>
    </div>
  </div>
</header>
