{% load static %}
<header class="header secondary">
  <div class="container md:container">
    <div class="left"><a class="logo" href="/">Logo</a></div>
    <div class="right">
      <nav>
        <a class="link" href="/#about">Sobre Nós</a> 

        {% if categories.items|length or combos|length %}
        <div class="dropdown-desktop">
          <button class="link">Produtos</button>
          <div class="dropdown-content">
            {% for category_name, products in categories.items %}
            <p class="text-mb-2">
              <a class="link" href="/#{{products.0.product.category.get_code}}">
                {{category_name}}
              </a>
            </p>
            {% endfor %}
            {% if combos|length %}
            <p class="text-mb-2">
              <a class="link" href="/#combos">Combos</a>
            </p>
            {% endif %}
          </div>
        </div>
        {% endif %}

        <a class="link" href="/#faq">Perguntas</a>
        <a class="link" href="/#contacts">Contatos</a>
        <a class="" href="/" @click.prevent="openCart">
          <span class="badge active">
            <p class="badge-item" v-text="cart.totalCount(99)">0</p>
            <img src="{% static 'img/shopping-cart.svg' %}" alt="Carrinho" />
          </span>
        </a>
        <button class="menu-button" @click="openModal('menu')">
          Open menu
        </button>
      </nav>
    </div>
  </div>
</header>
