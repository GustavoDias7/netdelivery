{% load static %}
<header class="header secondary">
  <div class="container md:container">
    <div class="left"><a class="logo" href="/">Logo</a></div>
    <div class="right">
      <nav>
        <a class="link" href="/#about">Sobre Nós</a>
        <a class="link" href="/#pizza">Pizzas</a>
        <a class="link" href="/#drinks">Bebidas</a>
        <a class="link" href="/#faq">Perguntas</a>
        <a class="link" href="/#contacts">Contatos</a>
        <a class="" href="/" @click.prevent="openCart">
          <span class="badge active">
            <p class="badge-item" v-text="cart.totalCount(99)"></p>
            <img src="{% static 'img/shopping-cart.svg' %}" alt="Carrinho" />
          </span>
        </a>
        <button class="menu-button" @click="openModal('menu')">Open menu</button>
      </nav>
    </div>
  </div>
</header>
