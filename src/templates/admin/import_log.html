{% extends 'admin/base_site.html' %} {% load static %} {% block content %}
<div>
  <h1>{{form_title}}</h1>
  <h2>{{description}}</h2>
  <form method="POST" id="csv-form" enctype="multipart/form-data">
    {% csrf_token %}
    <label for="logradouros">Select a .txt file(logradouros):</label>
    <input type="file" name="logradouros" />
    <br />
    <button id="submit">Upload .txt</button>
  </form>
</div>
{% endblock %}
