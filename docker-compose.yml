version: "3.9"

services:
  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - db
    networks:
      - projectnetwork
    command: >
      sh -c "sleep 5 &&
            python manage.py migrate &&
            python manage.py loaddata address.json order.json product.json &&
            python manage.py handlesuperuser &&
            yarn build &&
            python manage.py runserver 0.0.0.0:8000"
  db:
    image: postgres:14
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - projectnetwork

volumes:
  postgres_data:

networks:
  projectnetwork:
    driver: bridge
    